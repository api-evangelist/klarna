specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Klarna
providerId: klarna
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Payments
  - BNPL
  - Checkout
description: 'FOCUS-aligned FinOps for Klarna: per-transaction take rate (BNPL/Pay-Later) settled out
  of merchant payouts, with no public per-merchant tariff.'
sources:
  - https://www.klarna.com/business/products/payments/
  - https://docs.klarna.com/
notes: Klarna fees are not publicly listed; reconcile from actual settlement reports / partner-platform
  passthrough disclosures.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Klarna Bank AB
serviceCategory: Payments
billingModel:
  pricingCategory: Take Rate (Negotiated)
  billingFrequency: Continuous Settlement
  billingCurrency: USD/EUR/GBP/SEK (varies by region)
  chargeCategories:
    - Usage
    - Adjustment
    - Refund
    - Credit
focusColumns:
  ServiceName: Klarna
  ServiceCategory: Payments
  ServiceSubcategory: Buy Now Pay Later
  ProviderName: Klarna
  PublisherName: Klarna Bank AB
  InvoiceIssuerName: Klarna Bank AB
  BillingCurrency: USD
meters:
  - name: klarna_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - country
      - product
      - merchant
  - name: klarna_transaction_volume
    unit: currency
    aggregation: sum
    dimensions:
      - country
      - product
      - currency
  - name: klarna_refunds
    unit: transaction
    aggregation: sum
  - name: klarna_chargebacks
    unit: transaction
    aggregation: sum
  - name: klarna_settlement_payouts
    unit: payout
    aggregation: sum
    dimensions:
      - country
      - currency
principles:
  - name: Visibility
    description: Use the Klarna Settlements API and the merchant portal Reports section to ingest daily/weekly
      payout files and reconcile gross transaction volume vs net payout (the difference is Klarna's take).
  - name: Allocation
    description: Tag Klarna sessions / orders with a merchant_reference linking to internal SKU, store,
      or marketplace seller so per-team take-rate cost can be allocated.
  - name: Optimization
    description: Compare direct-merchant pricing vs partner-platform passthrough (Stripe, Adyen) at scale;
      negotiate volume tiers and product mix (Pay-in-4 vs Financing) to lower blended take rate.
  - name: Accountability
    description: Finance reconciles monthly Klarna settlement reports against the order ledger; chargebacks
      and disputed transactions roll up to the responsible merchant team.
maintainers:
