specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Klarna
providerId: klarna
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Payments
  - BNPL
  - Checkout
  - E-commerce
description: Klarna does not publish merchant pricing publicly. Merchants enroll through the Klarna merchant
  portal or via partner platforms (Stripe, Adyen, Shopify Payments) where Klarna's per-transaction take
  rate is bundled into that partner's pricing. Direct Klarna pricing is quoted per-merchant after sales
  intake and varies by region (US/UK/EU/Nordics) and product (Pay in 4, Pay in 30, Financing).
sources:
  - https://www.klarna.com/business/products/payments/
  - https://www.klarna.com/us/business/pricing/
notes: No public pricing page. Klarna fees are quoted per merchant; revisit if Klarna publishes a public
  pricing tariff or when reconciling against partner-platform passthrough rates (e.g. Stripe's published
  Klarna pricing).
plans:
  - id: klarna-merchant-direct
    name: Klarna Merchant (Direct)
    type: usage-based
    description: Per-transaction take rate negotiated directly with Klarna; varies by region and product.
    entries:
      - label: Per-transaction merchant fee
        name: klarna_take_rate
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Pay in 4 / Pay in 30 days
      - name: Klarna Financing
      - name: Klarna One-time card
      - name: Order Management API
      - name: Settlements API
  - id: klarna-merchant-via-partner
    name: Klarna via Partner Platform
    type: usage-based
    description: Klarna offered through a partner processor (Stripe, Adyen, etc.); fees follow that processor's
      published Klarna passthrough.
    entries:
      - label: Partner-passthrough fee
        name: klarna_partner_fee
        type: metered
        metric: transaction
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see partner pricing
        userMultiplied: false
    elements:
      - name: Available via Stripe, Adyen, Shopify Payments, and other partners
      - name: Activated through partner dashboards without separate Klarna contract
maintainers:
